# Single conda environment: OpenSim + Python deps + Jupyter + tests + mesh/Rerun (pip).
# Create:  conda env create -f environment.yml
# Update: conda env update -f environment.yml --prune
name: musclemap-data
channels:
  - conda-forge
  - opensim-org
dependencies:
  - python=3.11
  - opensim
  - numpy>=1.26
  - scipy>=1.11
  - matplotlib>=3.8
  - tqdm>=4.66
  - pyyaml>=6.0
  - jupyterlab
  - ipywidgets>=8.0
  - plotly>=5.20
  - dash>=2.17
  - pandas>=3.0
  - pytest>=8.0
  - pytest-cov>=5.0
  - gdown>=5.1
  - ipykernel
  - pip
  - pip:
      - pyrender>=0.1.45
      - trimesh>=4.0
      - torch>=2.1.0,<2.5.0
      - smplx>=0.1.28,<0.2
      - rerun-sdk>=0.21
